name: 3 - Terraform Destroy

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Delete all ECR images
        run: |
          # Get all image digests in the repo and delete them all
          # Using digests instead of tags catches untagged images too
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name production-notification-service \
            --region ${{ secrets.AWS_REGION }} \
            --query 'imageIds[*]' \
            --output json)

          if [ "$IMAGE_IDS" = "[]" ]; then
            echo "No images to delete"
          else
            aws ecr batch-delete-image \
              --repository-name production-notification-service \
              --image-ids "$IMAGE_IDS" \
              --region ${{ secrets.AWS_REGION }}
            echo "All images deleted"
          fi

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve